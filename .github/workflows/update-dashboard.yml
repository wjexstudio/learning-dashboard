name: Update LEARNING Dashboard

on:
  schedule:
    - cron: '0 3 * * *'   # 10:00 Bangkok (UTC+7)
    - cron: '0 13 * * *'  # 20:00 Bangkok (UTC+7)
  workflow_dispatch:       # manual trigger anytime

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Notion & regenerate dashboard
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 update_dashboard.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html .snapshot.json
          git diff --staged --quiet && echo "No changes." || \
            (git commit -m "auto: update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
